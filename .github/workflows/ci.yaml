name: 'Lint and Test'

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v6

      - name: 'Setup Nodejs'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 'Install dependencies'
        run: pnpm install

      - name: 'Run linting'
        run: pnpm lint

      - name: 'Run tests'
        run: pnpm test
